<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPSLS Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ui/styles.css">
</head>
<body>
  <div class="bg-orb orb-a" aria-hidden="true"></div>
  <div class="bg-orb orb-b" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>
  <main class="app">
    <section class="card">
      <p class="eyebrow">Rock Paper Scissors Lizard Spock</p>
      <h1>Choose Your Super Move!</h1>
      <p class="sub">Tap a colorful card and see who wins this round.</p>
      <p class="tip">Tip: each move has its own color and icon to make choices easy.</p>

      <section class="match" aria-label="Best of 5 scoreboard">
        <p class="match-title">Best of 5: First to 3 wins</p>
        <div class="scoreboard">
          <p class="score-item">You: <strong id="playerScore">0</strong></p>
          <p class="score-item">Computer: <strong id="computerScore">0</strong></p>
          <p class="score-item">Ties: <strong id="tieScore">0</strong></p>
        </div>
        <p class="round-tracker" id="roundTracker">Round 1</p>
        <button class="new-match" id="newMatchBtn" type="button">Start New Match</button>
      </section>

      <div id="choices" class="choices"></div>

      <section class="result" id="result">
        <p class="status" id="status">Make your move.</p>
        <div class="arena" id="arena">
          <div class="fighter">
            <p class="label">You</p>
            <div class="badge" id="playerIcon"></div>
          </div>
          <p class="versus">VS</p>
          <div class="fighter">
            <p class="label">Computer</p>
            <div class="badge" id="computerIcon"></div>
          </div>
        </div>
        <div class="vs">
          <div>
            <p class="label">You</p>
            <p class="choice" id="playerChoice">-</p>
          </div>
          <div>
            <p class="label">Computer</p>
            <p class="choice" id="computerChoice">-</p>
          </div>
        </div>
      </section>
    </section>
  </main>
  <script src="/ui/app.js"></script>
</body>
</html>
